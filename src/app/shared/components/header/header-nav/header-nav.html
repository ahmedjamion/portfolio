<!-- Desktop Navigation -->
<nav class="hidden md:block">
  <ul class="flex gap-6 text-lg">
    @for (link of navLinks; track link.href) {
    <li>
      <a
        [href]="link.href"
        (click)="closeNav()"
        [class.neon-pink]="activeSection() === link.id"
        [class.text-gray-400]="activeSection() !== link.id"
        class="hover:text-[#00ffff] transition-all duration-200 px-2 py-1"
      >
        <span class="text-[#00ff00]">&lt;</span>
        {{ link.label }}
        <span class="text-[#00ff00]">/&gt;</span>
      </a>
    </li>
    }
  </ul>
</nav>

<!-- Mobile Navigation -->
<nav class="relative md:hidden flex items-center gap-2">
  @if (!isNavOpen()) {
  <span class="text-lg font-semibold text-[#00ffff]">{{ activeSection() | titlecase }}</span>
  }

  <button
    (click)="toggleNav()"
    class="flex items-center cursor-pointer p-2 border border-[#ff00ff] rounded hover:bg-[#ff00ff]/20 transition-colors"
    #menuButton
    [attr.aria-label]="isNavOpen() ? 'Close menu' : 'Open menu'"
  >
    <app-icon name="menu" size="24" color="#ff00ff" />
  </button>

  <ng-template
    cdkConnectedOverlay
    [cdkConnectedOverlayOrigin]="menuButton"
    [cdkConnectedOverlayOpen]="isNavOpen()"
    (backdropClick)="closeNav()"
    [cdkConnectedOverlayHasBackdrop]="true"
    [cdkConnectedOverlayBackdropClass]="'cdk-overlay-transparent-backdrop'"
  >
    <ul
      class="absolute right-0 flex flex-col items-center bg-[#0a0a0f] border border-[#ff00ff] shadow-[0_0_20px_rgba(255,0,255,0.3)] rounded-xl p-6 gap-4 text-lg min-w-[200px]"
    >
      @for (link of navLinks; track link.href) {
      <li>
        <a
          [href]="link.href"
          (click)="closeNav()"
          [class.neon-pink]="activeSection() === link.id"
          [class.text-gray-400]="activeSection() !== link.id"
          class="hover:text-[#00ffff] transition-all duration-200 block"
        >
          <span class="text-[#00ff00]">&lt;</span>{{ link.label }}<span class="text-[#00ff00]">/&gt;</span>
        </a>
      </li>
      }
    </ul>
  </ng-template>
</nav>
