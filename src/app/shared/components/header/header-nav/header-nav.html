<nav class="bg-background p-2 rounded-xl drop-shadow-sm">
  <ul class="flex">
    @for (link of navLinks; track link.href) {
      @let isActive = activeSection() === link.id;
      <li
        (click)="closeNav()"
        class="transition-all duration-300 ease-in-out px-2 rounded-lg"
        [class.bg-surface]="isActive"
      >
        <a [href]="link.href">
          {{ link.label }}
        </a>
      </li>
    }
  </ul>
</nav>
