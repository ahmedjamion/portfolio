<nav class="hidden md:block">
  <ul class="flex gap-4 text-lg">
    @for (link of navLinks; track link.href) {
    <li>
      <a
        [href]="link.href"
        (click)="closeNav()"
        [class.text-blue-600]="activeSection() === link.id"
        [class.font-semibold]="activeSection() === link.id"
      >
        {{ link.label }}
      </a>
    </li>
    }
  </ul>
</nav>

<nav class="relative md:hidden flex items-center gap-2">
  @if (!isNavOpen()) {
  <span class="text-lg font-semibold">{{ activeSection() | titlecase }}</span>
  }

  <button
    (click)="toggleNav()"
    class="flex items-center cursor-pointer"
    #menuButton
    [attr.aria-label]="isNavOpen() ? 'Close menu' : 'Open menu'"
  >
    <app-icon name="menu" size="24" />
  </button>

  <ng-template
    cdkConnectedOverlay
    [cdkConnectedOverlayOrigin]="menuButton"
    [cdkConnectedOverlayOpen]="isNavOpen()"
    (backdropClick)="closeNav()"
    [cdkConnectedOverlayHasBackdrop]="true"
    [cdkConnectedOverlayBackdropClass]="'cdk-overlay-transparent-backdrop'"
  >
    <ul
      class="absolute right-0 flex flex-col items-center bg-gray-200 shadow rounded-xl p-4 gap-4 text-lg"
    >
      @for (link of navLinks; track link.href) {
      <li>
        <a
          [href]="link.href"
          (click)="closeNav()"
          [class.text-blue-600]="activeSection() === link.id"
          [class.font-semibold]="activeSection() === link.id"
          >{{ link.label }}</a
        >
      </li>
      }
    </ul>
  </ng-template>
</nav>
