<app-section [id]="'contact'">
  <!-- CHAOTIC HEADING -->
  <h2 
    class="chaos-heading text-[#00ff00] mb-12" 
    data-text="CONTACT"
    appGlitch="intense"
  >
    CONTACT
  </h2>

  <!-- Email -->
  <div class="mb-6">
    <a 
      href="mailto:jamionahmedrashadi@gmail.com" 
      class="text-xl text-[#00ffff] hover:underline cyber-btn-chaos"
      appGlitch="mild"
      appHoverChaos
    >
      jamionahmedrashadi@gmail.com
    </a>
  </div>

  <!-- Simple links -->
  <div class="flex flex-wrap gap-4 justify-center">
    <a 
      href="https://www.github.com/ahmedjamion" 
      target="_blank"
      class="text-[#ff00ff] hover:underline cyber-btn-chaos glitch"
      data-text="github"
      appGlitch="mild"
      appHoverChaos
    >
      github
    </a>
    <a 
      href="https://www.linkedin.com/in/ahmed-rashad-jamion" 
      target="_blank"
      class="text-[#00ffff] hover:underline cyber-btn-chaos glitch"
      data-text="linkedin"
      appGlitch="mild"
      appHoverChaos
    >
      linkedin
    </a>
  </div>

  <!-- Location -->
  <p class="mt-8 text-gray-500 glitch" data-text="zamboanga, philippines" appGlitch="intense">
    zamboanga, philippines
  </p>
  
  <!-- Random hack message -->
  <p class="mt-4 text-[#ff0040] text-lg flicker glitch-intense" data-text="YOUR IP HAS BEEN LOGGED" appGlitch="intense">
    YOUR IP HAS BEEN LOGGED
  </p>
</app-section>
