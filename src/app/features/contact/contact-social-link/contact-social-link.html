<a
  [href]="url()"
  target="_blank"
  rel="noopener noreferrer"
  class="flex items-center gap-3 px-6 py-3 border border-[#ff00ff] hover:bg-[#ff00ff]/20 hover:shadow-[0_0_20px_rgba(255,0,255,0.4)] transition-all duration-200"
>
  <app-icon [name]="iconName()" [size]="iconSize()" [color]="iconColor()" strokeWidth="40" />
  <span class="text-[#ff00ff] font-bold tracking-wider">{{ text() }}</span>
</a>
