<div class="cyber-card cyber-card-chaos group h-full flex flex-col" appHoverChaos>
  <!-- Project Image -->
  @if (imageUrl()) {
  <div class="relative overflow-hidden mb-4">
    <img 
      [ngSrc]="imageUrl()!" 
      alt="Project" 
      class="w-full h-40 object-cover"
      width="300"
      height="160"
    />
  </div>
  }

  <!-- Project Name -->
  <p class="text-lg font-bold text-[#00ffff] mb-2 glitch" [attr.data-text]="name()" appGlitch="mild">
    {{ name() }}
  </p>
  
  <!-- Description -->
  <p class="text-gray-400 text-sm flex-grow">{{ description() }}</p>
  
  <!-- Random Stats (CHAOS!) -->
  <div class="flex justify-between text-xs mt-2 mb-2 text-[#ff00ff]">
    <span class="glitch" [attr.data-text]="'views: ' + getRandomStat()" appGlitch="intense">views: {{ getRandomStat() }}</span>
    <span class="glitch" [attr.data-text]="getRandomRarity()" appGlitch="intense">{{ getRandomRarity() }}</span>
  </div>

  <!-- Github Link -->
  @if (githubUrl()) {
  <a
    [href]="githubUrl()"
    target="_blank"
    rel="noopener noreferrer"
    class="cyber-btn cyber-btn-chaos text-center text-sm mt-4"
    appHoverChaos
  >
    view code
  </a>
  }
</div>
