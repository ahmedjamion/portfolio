<div
  class="max-w-2xs flex flex-col items-center p-2 bg-surface rounded-xl drop-shadow-sm hover:scale-102 transition-all duration-300 ease-in-out h-48 aspect-4/3"
>
  <div class="flex flex-col grow items-center justify-center">
    <p class="text-lg font-semibold">{{ name() }}</p>
    <p class="text-pretty text-sm grow text-center flex items-center">{{ description() }}</p>
  </div>
  <div class="flex gap-2">
    @if (githubUrl()) {
      <a
        [href]="githubUrl()"
        target="_blank"
        rel="noopener noreferrer"
        class="px-3 py-1 rounded-full hover:bg-primary hover:text-on-primary flex gap-2 transition-all duration-300 ease-in-out"
      >
        <p>Github</p>
      </a>
    }
    @if (liveUrl()) {
      <a
        [href]="liveUrl()"
        target="_blank"
        rel="noopener noreferrer"
        class="px-3 py-1 rounded-full hover:bg-primary hover:text-on-primary flex gap-2 transition-all duration-300 ease-in-out"
      >
        <p>Live</p>
      </a>
    }
  </div>
</div>
