<div
  class="max-w-2xs flex flex-col items-center p-2 bg-surface rounded-3xl drop-shadow-sm hover:scale-102 transition-all duration-300 ease-in-out"
>
  @if (imageUrl()) {
    <img
      [ngSrc]="imageUrl()!"
      alt="Project"
      class="rounded-2xl"
      width="300"
      height="300"
      priority
    />
  }

  <div class="flex flex-col items-center gap-2">
    <p class="text-lg font-semibold">{{ name() }}</p>
    <p class="text-pretty text-sm">{{ description() }}</p>
    @if (githubUrl()) {
      <a
        [href]="githubUrl()"
        target="_blank"
        rel="noopener noreferrer"
        class="px-3 py-1 rounded-full hover:bg-primary hover:text-on-primary flex gap-2 transition-all duration-300 ease-in-out"
      >
        <p>View on Github</p>
        <app-icon name="github" size="16" />
      </a>
    }
  </div>
</div>
