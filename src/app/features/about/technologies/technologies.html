<div class="flex flex-wrap gap-3 justify-center">
  @for (lang of languages(); track lang.name) {
  <app-technology [name]="lang.name" />
  }
  @for (fw of frameworks(); track fw.name) {
  <app-technology [name]="fw.name" />
  }
  @for (concept of concepts(); track concept.name) {
  <app-concept [name]="concept.name" />
  }
</div>
